naftiko: "1.0.0-alpha1"

info:
  label: Applied Materials API
  description: >-
    API for managing semiconductor manufacturing equipment from Applied Materials,
    including equipment monitoring and maintenance scheduling.
  tags:
    - Applied Materials
    - Semiconductor
    - Manufacturing
    - Equipment
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      AMAT_API_TOKEN: AMAT_API_TOKEN

capability:
  consumes:
    - type: http
      namespace: amat
      baseUri: "https://api.applied-materials.com/v1"
      description: Applied Materials equipment management API
      authentication:
        type: bearer
        token: "{{AMAT_API_TOKEN}}"
      resources:
        - name: equipment
          path: /equipment
          description: Semiconductor manufacturing equipment
          operations:
            - name: list-equipment
              method: GET
              description: Returns a list of manufacturing equipment
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-equipment
              method: GET
              description: Returns details for a specific piece of equipment
              inputParameters:
                - name: equipmentId
                  in: path
                  type: string
                  required: true
                  description: Equipment identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: maintenance
          path: /maintenance
          description: Equipment maintenance records
          operations:
            - name: list-maintenance
              method: GET
              description: Returns maintenance records
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: schedule-maintenance
              method: POST
              description: Schedules a maintenance event
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  equipmentId: "{{tools.equipmentId}}"
                  type: "{{tools.type}}"
                  scheduledDate: "{{tools.scheduledDate}}"

  exposes:
    - type: mcp
      port: 9090
      namespace: amat-mcp
      transport: http
      tools:
        - name: list-equipment
          description: Lists semiconductor manufacturing equipment from Applied Materials
          hints:
            readOnly: true
            idempotent: true
          call: "amat.list-equipment"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-equipment-details
          description: Gets detailed information for a specific piece of semiconductor manufacturing equipment
          hints:
            readOnly: true
            idempotent: true
          call: "amat.get-equipment"
          with:
            equipmentId: "tools.equipmentId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: schedule-maintenance
          description: Schedules a maintenance event for semiconductor manufacturing equipment
          hints:
            readOnly: false
            destructive: false
          call: "amat.schedule-maintenance"
          with:
            equipmentId: "tools.equipmentId"
            type: "tools.type"
            scheduledDate: "tools.scheduledDate"
          outputParameters:
            - type: object
              mapping: "$."
